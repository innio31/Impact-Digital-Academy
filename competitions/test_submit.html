<!DOCTYPE html>
<html>

<head>
    <title>Test Answer Submission</title>
</head>

<body>
    <h2>Test Answer Submission</h2>

    <button onclick="testSubmit()">Test Submit Answer</button>

    <div id="result" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>

    <script>
        function testSubmit() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            // Try different paths
            const paths = [
                'ajax/submit_answer.php',
                '/competitions/ajax/submit_answer.php',
                '../ajax/submit_answer.php',
                './ajax/submit_answer.php'
            ];

            let currentPathIndex = 0;

            function tryNextPath() {
                if (currentPathIndex >= paths.length) {
                    resultDiv.innerHTML = '❌ All paths failed';
                    return;
                }

                const path = paths[currentPathIndex];
                resultDiv.innerHTML += `<br>Trying: ${path}`;

                const formData = new URLSearchParams();
                formData.append('question_id', '1');
                formData.append('answer', 'A');
                formData.append('time_taken', '2.5');

                fetch(path, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                })
                    .then(response => {
                        resultDiv.innerHTML += ` - Status: ${response.status}<br>`;
                        return response.text().then(text => {
                            try {
                                return JSON.parse(text);
                            } catch (e) {
                                return { error: 'Not JSON', text: text.substring(0, 200) };
                            }
                        });
                    })
                    .then(data => {
                        resultDiv.innerHTML += `✅ Success with ${path}<br>`;
                        resultDiv.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    })
                    .catch(error => {
                        resultDiv.innerHTML += `❌ Failed with ${path}: ${error}<br>`;
                        currentPathIndex++;
                        tryNextPath();
                    });
            }

            tryNextPath();
        }
    </script>
</body>

</html>
